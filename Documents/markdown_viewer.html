<script>
const DEFAULT=`# 기능 명세서 (Functional Specification)

**프로젝트명:** Jobizic (코드명: adam)

## 2. 기능별 상세 명세

### 2.1 이력서 분석

#### 2.1.1 입력
- 이력서 파일 업로드 (PDF, DOCX, HWP)
- 텍스트 직접 입력

#### 2.1.2 처리 흐름
파싱 → 섹션 분리 → AI 분석 → 점수화

#### 2.1.3 결과 출력
- 종합 점수 (100점 만점)
- 강점/약점 리스트
- 개선 제안 사항

### 2.2 JD 적합도 분석

#### 2.2.1 입력
- JD 텍스트 또는 URL 입력
- 분석할 이력서 선택

#### 2.2.2 처리 흐름
JD 파싱 → 키워드 추출 → 이력서 매칭 → 적합도 산출

#### 2.2.3 결과 출력
- 적합도 점수 (%)
- 매칭 키워드 목록
- 부족 역량 안내

### 2.3 이력서 자동 생성

#### 2.3.1 입력
- 기존 이력서 또는 기본 정보 입력
- 타겟 JD 선택

#### 2.3.2 처리 흐름
정보 수집 → AI 초안 생성 → 사용자 검토 → 최종 출력

#### 2.3.3 출력
- DOCX 또는 PDF 파일
- 편집 가능한 웹 뷰

### 2.4 면접 가이드

#### 2.4.1 입력
- 이력서 + JD 조합 선택

#### 2.4.2 출력 섹션 (6개)
1. 예상 질문 리스트
2. 모범 답변 예시
3. 주의사항
4. 산업 트렌드 요약
5. 회사 정보 요약

## 3. 사용자 흐름 (User Flow)

### 3.1 신규 가입 흐름

랜딩 페이지 → **[무료로 시작하기]** → Google 로그인
→ after-login 처리 (users 테이블 생성) → /analyze 리다이렉트

\`\`\`
랜딩 페이지 → [무료로 시작하기] → Google 로그인
→ after-login 처리 → /analyze 리다이렉트
\`\`\`

### 3.2 기존 회원 흐름

로그인 → 대시보드 → 분석 선택 → 결과 확인 → 저장

const ta=document.getElementById('md-textarea');
const preview=document.getElementById('md-preview');
const tocBody=document.getElementById('toc-body');
ta.value=DEFAULT;

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function parseMD(raw){
  let md=esc(raw);
  const blocks=[];
  md=md.replace(/```([\s\S]*?)```/g,(_,c)=>{
    const i=blocks.length;
    blocks.push(`<pre><code>${c.replace(/^\n/,'')}</code></pre>`);
    return `\x00B${i}\x00`;
  });
  md=md.replace(/`([^`\n]+)`/g,'<code>$1</code>');
  const lines=md.split('\n');
  const out=[];
  let ul=false,ol=false,inTable=false,tRows=[],tHead=true;
  function flushList(){if(ul){out.push('</ul>');ul=false;}if(ol){out.push('</ol>');ol=false;}}
  function flushTable(){
    if(!inTable)return;
    let h='<table>';
    tRows.forEach(r=>{h+='<tr>';r.cells.forEach(c=>h+=r.isH?`<th>${c}</th>`:`<td>${c}</td>`);h+='</tr>';});
    h+='</table>';out.push(h);inTable=false;tRows=[];tHead=true;
  }
  for(let i=0;i<lines.length;i++){
    const l=lines[i];
    const hm=l.match(/^(#{1,6})\s+(.+)/);
    const ulm=l.match(/^[-*]\s+(.+)/);
    const olm=l.match(/^\d+\.\s+(.+)/);
    const tm=l.match(/^\|(.+)\|$/);
    const sep=l.match(/^\|[\s\-:|]+\|$/);
    if(!ulm&&!tm&&!sep)flushList();
    if(!tm&&!sep)flushTable();
    if(sep)continue;
    if(hm){out.push(`<h${hm[1].length}>${inl(hm[2])}</h${hm[1].length}>`);continue;}
    if(ulm){if(!ul){out.push('<ul>');ul=true;}out.push(`<li>${inl(ulm[1])}</li>`);continue;}
    if(olm){if(!ol){out.push('<ol>');ol=true;}out.push(`<li>${inl(olm[1])}</li>`);continue;}
    if(tm){
      if(!inTable){inTable=true;tRows=[];tHead=true;}
      const cells=l.split('|').slice(1,-1).map(c=>c.trim());
      tRows.push({cells,isH:tHead});tHead=false;continue;
    }
    const bq=l.match(/^&gt;\s*(.+)/);
    if(bq){out.push(`<blockquote><p>${inl(bq[1])}</p></blockquote>`);continue;}
    if(l.match(/^---$/)){out.push('<hr>');continue;}
    if(l.match(/^\x00B\d+\x00$/)){out.push(l);continue;}
    if(l.trim()===''){out.push('');continue;}
    out.push(`<p>${inl(l)}</p>`);
  }
  flushList();flushTable();
  let r=out.join('\n');
  blocks.forEach((b,i)=>{r=r.replace(`\x00B${i}\x00`,b);});
  return r.replace(/<p><\/p>/g,'');
}

function inl(s){
  return s
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2">$1</a>');
}

function buildTOC(raw){
  tocBody.innerHTML='';
  raw.split('\n').forEach(l=>{
    const m=l.match(/^(#{1,4})\s+(.+)/);
    if(!m)return;
    const text=m[2].replace(/\*\*/g,'').replace(/\*/g,'');
    const d=document.createElement('div');
    d.className=`toc-item toc-h${m[1].length}`;
    d.textContent=text;d.title=text;
    d.onclick=()=>{
      document.querySelectorAll('#md-preview h1,#md-preview h2,#md-preview h3,#md-preview h4').forEach(h=>{
        if(h.textContent.trim()===text.trim())h.scrollIntoView({behavior:'smooth',block:'start'});
      });
    };
    tocBody.appendChild(d);
  });
}

function onEdit(){
  preview.innerHTML=parseMD(ta.value);
  buildTOC(ta.value);
}

let tocOpen=true;
function toggleToc(){
  tocOpen=!tocOpen;
  document.getElementById('toc-body').style.display=tocOpen?'block':'none';
  document.getElementById('toc-toggle').textContent=tocOpen?'▼':'▶';
}

let fullMode=false;
function toggleFull(){
  fullMode=!fullMode;
  const ec=document.getElementById('editor-col');
  const btn=document.getElementById('btn-fullview');
  if(fullMode){
    ec.classList.add('hidden');
    btn.classList.add('on');
    btn.innerHTML='<i class="ti ti-minimize" aria-hidden="true"></i> 편집 보기';
  } else {
    ec.classList.remove('hidden');
    btn.classList.remove('on');
    btn.innerHTML='<i class="ti ti-maximize" aria-hidden="true"></i> 전체 보기';
  }
}

function getFullHTML(){
  return `<!DOCTYPE html>\n<html lang="ko">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width,initial-scale=1.0">\n<title>Markdown Export</title>\n<style>\nbody{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;max-width:860px;margin:48px auto;padding:0 28px;line-height:1.8;color:#1a1a1a;background:#fff;}\nh1{font-size:24px;font-weight:700;margin:0 0 16px;}\nh2{font-size:18px;font-weight:700;margin:28px 0 10px;border-bottom:1px solid #e8e8e8;padding-bottom:6px;}\nh3{font-size:15px;font-weight:700;margin:20px 0 6px;}\nh4{font-size:14px;font-weight:600;margin:14px 0 4px;color:#444;}\np{margin:0 0 10px;}\ncode{font-family:'Courier New',monospace;font-size:13px;background:#f5f5f5;padding:1px 5px;border-radius:3px;color:#d14;}\npre{background:#1e1e1e;color:#d4d4d4;border-radius:6px;padding:16px;overflow-x:auto;margin:0 0 14px;font-size:13px;line-height:1.65;}\npre code{background:none;padding:0;color:inherit;}\ntable{width:100%;border-collapse:collapse;margin:0 0 14px;font-size:13px;}\nth{background:#f5f5f3;padding:7px 11px;border:1px solid #ddd;font-weight:600;text-align:left;}\ntd{padding:6px 11px;border:1px solid #ddd;}\nblockquote{border-left:3px solid #ccc;padding-left:14px;color:#666;margin:0 0 10px;}\nhr{border:none;border-top:1px solid #e8e8e8;margin:18px 0;}\nul,ol{margin:0 0 10px;padding-left:24px;}\nli{margin:3px 0;}\na{color:#0066cc;}\nstrong{font-weight:700;}\n</style>\n</head>\n<body>\n${parseMD(ta.value)}\n</body>\n</html>`;
}

function copyHTML(){
  navigator.clipboard.writeText(getFullHTML()).then(()=>{
    const b=document.getElementById('btn-copy');
    const o=b.innerHTML;
    b.innerHTML='<i class="ti ti-check"></i> 복사됨';
    setTimeout(()=>{b.innerHTML=o;},1800);
  });
}
function dlHTML(){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([getFullHTML()],{type:'text/html'}));
  a.download='export.html';a.click();
}
function dlMD(){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([ta.value],{type:'text/markdown'}));
  a.download='document.md';a.click();
}

document.getElementById('file-in').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{ta.value=ev.target.result;onEdit();};
  r.readAsText(f);e.target.value='';
});

onEdit();
</script>
