name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout 코드
        uses: actions/checkout@v4

      - name: 📦 Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📚 의존성 설치
        run: npm ci

      - name: 🎭 Playwright 브라우저 설치
        run: npx playwright install --with-deps chromium

      - name: 🔨 프로젝트 빌드
        run: npm run build
        env:
          # 테스트용 환경 변수 (실제 값 아님)
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://test.supabase.co' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'test-key' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'test-key' }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'test-secret' }}
          NEXTAUTH_URL: http://localhost:3000

      - name: 🧪 Smoke 테스트 실행
        run: npm test tests/smoke.spec.ts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://test.supabase.co' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'test-key' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'test-key' }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'test-secret' }}
          NEXTAUTH_URL: http://localhost:3000

      # 전체 E2E 테스트는 픽스처 준비 후 활성화
      # - name: 🎯 전체 E2E 테스트 실행
      #   run: npm test
      #   env:
      #     CI: true

      - name: 📊 테스트 리포트 업로드 (실패 시)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: 📸 테스트 결과 업로드 (실패 시)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7

  # 보안 스캔 (선택적)
  security:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔒 의존성 보안 감사
        run: npm audit --production

  # 린트 (선택적)
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📚 의존성 설치
        run: npm ci

      - name: 🔍 ESLint 실행
        run: npm run lint
